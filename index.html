<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.classless.min.css"
    />
    <title>Native HTML Pico Starter</title>

    <style>
      body {
        background-color: var(--pico-background-color);
        color: var(--pico-color);
        min-height: 100vh;
      }

      progress {
        position: absolute;
        border-radius: 0;
      }

      button:has(svg) {
        padding: 0.5rem;
        line-height: 1;
      }

      loading-veil {
        position: fixed;
        inset: 0;
        top: 10px;
        background-color: color-mix(
          in srgb,
          var(--pico-background-color) 80%,
          transparent
        );
        backdrop-filter: blur(2px);
        display: grid;
        place-items: center;
        z-index: 9999;
      }

      loading-veil[hidden] {
        display: none;
      }
    </style>
  </head>
  <body></body>
  <script>
    const html = (strings, ...values) =>
      strings.reduce((acc, str, idx) => acc + str + (values[idx] || ""), "");

    const sunIcon = html`
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="24"
        height="24"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        class="lucide lucide-sun-icon lucide-sun"
      >
        <circle cx="12" cy="12" r="4" />
        <path d="M12 2v2" />
        <path d="M12 20v2" />
        <path d="m4.93 4.93 1.41 1.41" />
        <path d="m17.66 17.66 1.41 1.41" />
        <path d="M2 12h2" />
        <path d="M20 12h2" />
        <path d="m6.34 17.66-1.41 1.41" />
        <path d="m19.07 4.93-1.41 1.41" />
      </svg>
    `;

    const moonIcon = html`
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="24"
        height="24"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        class="lucide lucide-moon-icon lucide-moon"
      >
        <path
          d="M20.985 12.486a9 9 0 1 1-9.473-9.472c.405-.022.617.46.402.803a6 6 0 0 0 8.268 8.268c.344-.215.825-.004.803.401"
        />
      </svg>
    `;

    const _state = localStorage.getItem("state");
    let state = _state
      ? JSON.parse(_state)
      : {
          isLoading: false,
          isAgreedToTerms: false,
          numberOfUUIDS: 5,
          UUIDS: [],
          userAccessLevel: null,
          userEmail: null,
          theme: localStorage.getItem("theme") ?? "light",
        };

    function setState(partial) {
      Object.assign(state, partial);
      localStorage.setItem("state", JSON.stringify(state));
      rerender();
    }

    function onRoute() {
      setState({
        route:
          location.hash.replace(/^#\//, "").split("/").filter(Boolean)[0] ||
          null,
      });
      scrollTo(0, 0);
    }

    function generate() {
      setState({ isLoading: true });
      const uuids = Array.from({ length: state.numberOfUUIDS }, () =>
        crypto.randomUUID(),
      );
      setTimeout(() => setState({ isLoading: false, UUIDS: uuids }), 1200);
    }

    const navbar = () => html`
      <progress ${state.isLoading ? "" : "hidden"}></progress>
      <header class="container">
        <nav>
          <ul>
            <li>
              <a href="#/"><kbd>Generator</kbd></a>
            </li>
          </ul>
          <ul>
            <li>
              <a href="#/account">Account</a>
            </li>
            <li>
              <button
                onclick="setState({ theme: state.theme === 'light' ? 'dark' : 'light' })"
              >
                ${state.theme === "dark" ? sunIcon : moonIcon}
              </button>
            </li>
          </ul>
        </nav>
      </header>
    `;

    const account = () => html`
      <main class="container">
        <header>
          <hgroup>
            <h1>Account</h1>
            <p>Manage your account</p>
          </hgroup>
        </header>

        <form>
          <fieldset>
            <label>
              Email
              <input
                value="${state.userEmail || ""}"
                onchange="setState({ userEmail: this.value })"
                type="email"
                id="email"
                placeholder="Email"
                autocomplete="email"
              />
            </label>

            <label>
              Access Level
              <select
                name="accessLevel"
                required
                onchange="setState({ userAccessLevel: this.value })"
              >
                <option
                  disabled
                  ${state.userAccessLevel !== "User" &&
                  state.userAccessLevel !== "Admin"
                    ? "selected"
                    : ""}
                  value=""
                >
                  Select your access level...
                </option>
                <option
                  value="User"
                  ${state.userAccessLevel === "User" ? "selected" : ""}
                >
                  User
                </option>
                <option
                  value="Admin"
                  ${state.userAccessLevel === "Admin" ? "selected" : ""}
                >
                  Admin
                </option>
              </select>
            </label>
          </fieldset>
        </form>
      </main>
    `;

    const home = () => html`
      <main class="container">
        <header>
          <hgroup>
            <h1>Generate Secure UID</h1>
            <p>Free and fast UID generation</p>
          </hgroup>
        </header>

        <hr />
        <article>
          <h2>Options</h2>
          <form>
            <fieldset>
              <label>
                How many to generate (${state.numberOfUUIDS})
                <input
                  type="range"
                  min="1"
                  max="20"
                  value=${state.numberOfUUIDS}
                  onchange="setState({ numberOfUUIDS: event.target.value ? Number(event.target.value) : 1 })"
                />
              </label>

              <label>
                <input
                  name="terms"
                  type="checkbox"
                  role="switch"
                  onclick="setState({ isAgreedToTerms: !state.isAgreedToTerms })"
                  ${state.isAgreedToTerms ? "checked" : ""}
                />
                I agree to the Terms
              </label>
            </fieldset>
            <button
              ${state.isAgreedToTerms ? "" : "disabled"}
              type="button"
              onclick="generate()"
            >
              Generate
            </button>
          </form>
        </article>
        <article ${state.UUIDS.length ? "" : "hidden"}>
          <h2>Results</h2>
          <table class="striped">
            <thead>
              <tr>
                <th>Number</th>
                <th>UUID</th>
              </tr>
            </thead>
            <tbody>
              ${state.UUIDS.map(
                (uuid, idx) => `
            <tr>
              <td>#${idx + 1}</td>
              <td>${uuid}</td>
            </tr>`,
              ).join("")}
            </tbody>
          </table>
        </article>
      </main>
    `;

    onRoute();
    window.addEventListener("hashchange", onRoute);

    function rerender() {
      document.body.setAttribute("data-theme", state.theme);
      document.body.innerHTML = `${navbar()} ${state.route === "account" ? account() : home()}
        <loading-veil ${state.isLoading ? "" : "hidden"}></loading-veil>`;
    }
  </script>
</html>
